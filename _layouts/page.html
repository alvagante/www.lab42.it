---
layout: default
---

<div class="page-hero {% if page.unit %}hero-{{ page.unit }}{% endif %}">
  <div class="container">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </div>
</div>

<div class="page-content">
  <div class="container">
    {{ content }}
  </div>
</div>
