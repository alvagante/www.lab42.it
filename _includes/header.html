<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="Lab42" class="site-logo__img" width="130" height="65">
      </a>

      <nav class="site-nav" id="site-nav">
        <a href="{{ '/about/' | relative_url }}" class="nav-link {% if page.url contains '/about' %}active{% endif %}">About</a>
        <a href="{{ '/example42/' | relative_url }}" class="nav-link nav-example42 {% if page.url contains '/example42' or page.url contains '/puppet' or page.url contains '/devops' %}active{% endif %}">Work</a>
        <a href="{{ '/ai/' | relative_url }}" class="nav-link nav-ai {% if page.url contains '/ai' %}active{% endif %}">AI</a>
        <a href="{{ '/media/' | relative_url }}" class="nav-link nav-media {% if page.url contains '/media' %}active{% endif %}">Media</a>
        <a href="https://calendar.app.google/STaVQe2MtVSXfrTR9" target="_blank" rel="noopener" class="nav-link">Contact</a>
      </nav>

      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
